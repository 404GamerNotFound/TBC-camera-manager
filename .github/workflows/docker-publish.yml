name: Publish Docker image

# Publishes a general-purpose, multi-arch prebuilt image to GHCR for anyone
# who wants `docker pull` instead of `docker compose up --build`. This is
# separate from the Home Assistant app image (home-assistant-app.yml, which
# publishes ghcr.io/.../tbc-camera-manager-ha with HA-specific tooling and
# triggers) - both build the same root Dockerfile, just under different
# image names and workflows, so neither affects the other.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/404gamernotfound/tbc-camera-manager

jobs:
  publish:
    name: Build and push multi-arch image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Derive image tags from the release tag
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "major_minor=${version%.*}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major_minor }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Verify anonymous image pull
        run: |
          docker logout ghcr.io || true
          if ! docker pull "${IMAGE_NAME}:${{ steps.version.outputs.version }}"; then
            echo "::error title=GHCR image is not public::Anonymous docker pull failed. Open https://github.com/404GamerNotFound?tab=packages, select tbc-camera-manager, open Package settings, and change visibility to Public."
            exit 1
          fi
