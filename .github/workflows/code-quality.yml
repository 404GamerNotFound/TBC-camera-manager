name: Code quality

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python 3.12
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            .github/requirements-ci.txt

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt --requirement .github/requirements-ci.txt

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Lint Python
        run: >-
          ruff check app tests
          --output-format=github
          --extend-per-file-ignores=app/tbc/themes/packages.py:F401
          --extend-per-file-ignores=app/tbc/themes/packages.py:F841

      - name: Compile Python sources
        run: python -m compileall -q app tests

      - name: Run tests
        run: python -m pytest -q

      - name: Validate Docker Compose
        run: docker compose config --quiet
