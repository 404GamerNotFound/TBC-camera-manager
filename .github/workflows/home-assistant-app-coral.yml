name: Home Assistant app (Coral)

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - "tbc_camera_manager_coral/config.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare app build
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      image_name: ${{ steps.normalize.outputs.image_name }}
      registry_prefix: ${{ steps.normalize.outputs.registry_prefix }}
      version: ${{ fromJSON(steps.info.outputs.version) }}
      name: ${{ fromJSON(steps.info.outputs.name) }}
      description: ${{ fromJSON(steps.info.outputs.description) }}
      url: ${{ fromJSON(steps.info.outputs.url) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Read app information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: ./tbc_camera_manager_coral

      - name: Verify release tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APP_VERSION: ${{ fromJSON(steps.info.outputs.version) }}
        run: test "v${APP_VERSION}" = "${GITHUB_REF_NAME}"

      - name: Normalize image information
        id: normalize
        env:
          IMAGE: ${{ fromJSON(steps.info.outputs.image) }}
        run: |
          echo "image_name=${IMAGE##*/}" >> "${GITHUB_OUTPUT}"
          echo "registry_prefix=${IMAGE%/*}" >> "${GITHUB_OUTPUT}"

      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.06.0
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.normalize.outputs.image_name }}
          registry-prefix: ${{ steps.normalize.outputs.registry_prefix }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Build and publish architecture image
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: .
          file: ./Dockerfile.coral
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          labels: |
            io.hass.type=app
            io.hass.name=${{ needs.prepare.outputs.name }}
            io.hass.description=${{ needs.prepare.outputs.description }}
            io.hass.url=${{ needs.prepare.outputs.url }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          push: true
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write

    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.06.0
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}

      - name: Verify anonymous image pull
        env:
          IMAGE: ${{ needs.prepare.outputs.registry_prefix }}/${{ needs.prepare.outputs.image_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          docker logout ghcr.io || true
          if ! docker pull "${IMAGE}:${VERSION}"; then
            echo "::error title=GHCR image is not public::Home Assistant requires anonymous pull access. Open the package settings, change its visibility to Public, and rerun this workflow."
            exit 1
          fi
