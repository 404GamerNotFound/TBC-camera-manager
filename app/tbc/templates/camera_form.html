{% extends "base.html" %}

{% block content %}
<section class="page-heading">
  <div>
    <p class="eyebrow">Camera module</p>
    <h1>Add camera</h1>
  </div>
</section>

<form class="editor-form" method="post" action="/cameras">
  {% if error %}
  <div class="inline-error">{{ error }}</div>
  {% endif %}
  <div class="form-grid">
    <label class="span-2">
      <span>Module</span>
      <select name="module_key" required>
        {% for camera_module in camera_modules %}
        <option value="{{ camera_module.key }}"
                data-onvif-port="{{ camera_module.default_onvif_port }}"
                data-http-port="{{ camera_module.default_http_port }}"
                data-rtsp-port="{{ camera_module.default_rtsp_port }}"
                data-supports-manual-stream="{{ 'true' if camera_module.supports_manual_stream_uri else 'false' }}"
                data-requires-manual-stream="{{ 'true' if camera_module.requires_manual_stream_uri else 'false' }}"
                data-requires-credentials="{{ 'true' if camera_module.requires_credentials else 'false' }}"
                {% if values.module_key == camera_module.key %}selected{% endif %}>
          {{ camera_module.label }} · {{ camera_module.description }}
        </option>
        {% endfor %}
      </select>
    </label>
    <label>
      <span>Name</span>
      <input name="name" value="{{ values.name }}" required autofocus>
    </label>
    <label class="host-field">
      <span>Host / IP</span>
      <input name="host" value="{{ values.host }}">
    </label>
    <label class="onvif-field">
      <span>ONVIF-Port</span>
      <input name="onvif_port" type="number" min="1" max="65535" value="{{ values.onvif_port }}" required>
    </label>
    <label class="http-field">
      <span>HTTP-Port</span>
      <input name="http_port" type="number" min="1" max="65535" value="{{ values.http_port }}" required>
    </label>
    <label class="rtsp-field">
      <span>RTSP-Port</span>
      <input name="rtsp_port" type="number" min="1" max="65535" value="{{ values.rtsp_port }}" required>
    </label>
    <label class="credential-field">
      <span>Username</span>
      <input name="username" value="{{ values.username }}" autocomplete="username">
    </label>
    <label class="credential-field">
      <span>Password</span>
      <input name="password" type="password" autocomplete="current-password">
    </label>
    <label class="span-2 manual-stream-field" hidden>
      <span>RTSP-/RTSPS-URL</span>
      <input name="manual_stream_uri" type="password" autocomplete="off" placeholder="rtsp://benutzer:passwort@kamera:554/pfad">
      <small>The full URL is stored securely and is always redacted in the interface.</small>
    </label>
  </div>
  <div class="form-actions">
    <a class="secondary-button" href="/cameras">Cancel</a>
    <button class="primary-button" type="submit">Save</button>
  </div>
</form>
<script src="{{ url_for('static', path='/camera-form.js') }}" defer></script>
{% endblock %}
