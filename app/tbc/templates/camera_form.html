{% extends "base.html" %}

{% block content %}
<section class="page-heading">
  <div>
    <p class="eyebrow" data-i18n="camera_form.camera_module">Camera module</p>
    <h1 data-i18n="camera_form.add_camera">Add camera</h1>
  </div>
</section>

<form class="editor-form" method="post" action="/cameras" data-plugin-selector-form>
  {% if error %}
  <div class="inline-error">{{ error }}</div>
  {% endif %}
  <div class="form-grid">
    <label class="span-2">
      <span data-i18n="camera_form.module">Module</span>
      <select name="module_key" required data-plugin-selector>
        {% for option in camera_module_options %}
        <option value="{{ option.key }}"
                data-label="{{ option.label }}"
                data-description="{{ option.description }}"
                data-installed="{{ 'true' if option.installed else 'false' }}"
                data-install-url="{{ option.install_url }}"
                data-onvif-port="{{ option.default_onvif_port }}"
                data-http-port="{{ option.default_http_port }}"
                data-rtsp-port="{{ option.default_rtsp_port }}"
                data-supports-manual-stream="{{ 'true' if option.supports_manual_stream_uri else 'false' }}"
                data-requires-manual-stream="{{ 'true' if option.requires_manual_stream_uri else 'false' }}"
                data-requires-credentials="{{ 'true' if option.requires_credentials else 'false' }}"
                {% if values.module_key == option.key %}selected{% endif %}>
          {{ option.label }}{% if option.description %} · {{ option.description }}{% endif %}{% if not option.installed %} · Not installed{% endif %}
        </option>
        {% endfor %}
      </select>
      <small class="plugin-install-prompt">
        <span data-i18n="plugin.camera_install_prompt">Need another camera manufacturer?</span>
        <a href="/plugin-sources" data-plugin-install-link data-i18n="plugin.open_external_sources">Open External sources</a>
      </small>
    </label>
    <div class="quiet-box plugin-unavailable-note span-2" data-plugin-unavailable hidden></div>
    <label>
      <span data-i18n="common.name">Name</span>
      <input name="name" value="{{ values.name }}" required autofocus>
    </label>
    <label class="host-field">
      <span data-i18n="camera.host_ip">Host / IP</span>
      <input name="host" value="{{ values.host }}">
    </label>
    <label class="onvif-field">
      <span data-i18n="camera.onvif_port">ONVIF-Port</span>
      <input name="onvif_port" type="number" min="1" max="65535" value="{{ values.onvif_port }}" required>
    </label>
    <label class="http-field">
      <span data-i18n="camera.http_port">HTTP-Port</span>
      <input name="http_port" type="number" min="1" max="65535" value="{{ values.http_port }}" required>
    </label>
    <label class="rtsp-field">
      <span data-i18n="camera.rtsp_port">RTSP-Port</span>
      <input name="rtsp_port" type="number" min="1" max="65535" value="{{ values.rtsp_port }}" required>
    </label>
    <label class="credential-field">
      <span data-i18n="camera.username">Username</span>
      <input name="username" value="{{ values.username }}" autocomplete="username">
    </label>
    <label class="credential-field">
      <span data-i18n="camera_form.password">Password</span>
      <input name="password" type="password" autocomplete="current-password">
    </label>
    <label class="span-2 manual-stream-field" hidden>
      <span data-i18n="camera_form.rtsp_url">RTSP-/RTSPS-URL</span>
      <input name="manual_stream_uri" type="password" autocomplete="off" placeholder="rtsp://benutzer:passwort@kamera:554/pfad">
      <small data-i18n="camera_form.full_url_stored_securely_always">The full URL is stored securely and is always redacted in the interface.</small>
    </label>
  </div>
  <div class="form-actions">
    <a class="secondary-button" href="/cameras" data-i18n="camera_form.cancel">Cancel</a>
    <button class="primary-button" type="submit" data-i18n="api_access.save">Save</button>
  </div>
</form>
<script src="{{ url_for('static', path='/camera-form.js') }}?v={{ asset_version }}" defer></script>
{% endblock %}
