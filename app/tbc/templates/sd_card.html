{% extends "base.html" %}

{% block content %}
<section class="page-heading">
  <div>
    <p class="eyebrow" data-i18n="sd_card.camera_archive">Camera archive</p>
    <h1 data-i18n="base.sd_card">SD card</h1>
  </div>
</section>

<form class="filter-bar sd-filter" method="get" action="/sd-card" data-sd-filter-form>
  <label>
    <span data-i18n="camera_new_choice.camera">Camera</span>
    <select name="camera_id">
      {% for camera in cameras %}
      <option value="{{ camera.id }}" {% if filters.camera_id == camera.id %}selected{% endif %}>{{ camera.name }}</option>
      {% endfor %}
    </select>
  </label>
  <label>
    <span data-i18n="camera.channel">Channel</span>
    <select name="channel">
      {% for item in channels %}
      <option value="{{ item.channel_index }}" {% if filters.channel == item.channel_index %}selected{% endif %}>
        {{ item.name }} · {{ item.channel_index + 1 }}
      </option>
      {% endfor %}
    </select>
  </label>
  <label>
    <span data-i18n="camera.stream">Stream</span>
    <select name="stream">
      <option value="main" {% if filters.stream == 'main' %}selected{% endif %}>Main</option>
      <option value="sub" {% if filters.stream == 'sub' %}selected{% endif %}>Sub</option>
    </select>
  </label>
  <label>
    <span data-i18n="recordings.from">From</span>
    <input name="date_from" type="date" value="{{ filters.date_from }}">
  </label>
  <label>
    <span data-i18n="recordings.to">To</span>
    <input name="date_to" type="date" value="{{ filters.date_to }}">
  </label>
  <button class="primary-button" type="submit" data-i18n="recordings.search">Search</button>
</form>

<div class="inline-error" data-sd-error {% if not error %}hidden{% endif %} data-i18n="{{ error_key or '' }}">{{ error or '' }}</div>

<section data-sd-content data-sd-can-load="{% if selected_camera and not error %}1{% else %}0{% endif %}">
  <section class="sd-preview-panel" data-sd-preview-panel hidden>
    <div class="section-title">
      <h2 data-sd-preview-title data-i18n="sd_card.preview">Preview</h2>
      <span data-sd-preview-meta></span>
    </div>
    <video class="sd-preview-player" preload="none" data-sd-preview-player></video>
  </section>

  <section class="quiet-box" data-sd-loading data-i18n="sd_card.loading_sd_card_content">
    Loading SD card content...
  </section>

  <section class="table-section" data-sd-table-section hidden>
    <div class="section-title">
      <h2 data-i18n="sd_card.recordings_sd_card">Recordings on SD card</h2>
      <span data-sd-count>0</span>
    </div>
    <div class="table-wrap">
      <table class="sd-table">
        <thead>
          <tr>
            <th data-i18n="sd_card.start">Start</th>
            <th data-i18n="sd_card.end">End</th>
            <th data-i18n="sd_card.duration">Duration</th>
            <th data-i18n="notification.type">Type</th>
            <th data-i18n="sd_card.file">File</th>
            <th data-i18n="sd_card.size">Size</th>
            <th></th>
          </tr>
        </thead>
        <tbody data-sd-recordings-body></tbody>
      </table>
    </div>
  </section>

  <section class="empty-state" data-sd-empty hidden>
    <h2 data-i18n="sd_card.no_sd_card_recordings_found">No SD card recordings found</h2>
  </section>
</section>

<script src="{{ url_for('static', path='/video-player.js') }}?v={{ asset_version }}" defer></script>
<script src="{{ url_for('static', path='/sd-card.js') }}?v={{ asset_version }}" defer></script>
{% endblock %}
