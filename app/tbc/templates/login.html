{% extends "base.html" %}

{% block content %}
<div class="login-language" aria-label="Change language" data-i18n-aria-label="nav.language">
  <button class="secondary-button" type="button" data-language="de" lang="de" data-i18n="nav.language_de">Deutsch</button>
  <button class="secondary-button" type="button" data-language="en" lang="en" data-i18n="nav.language_en">English</button>
  <button class="secondary-button" type="button" data-language="es" lang="es" data-i18n="nav.language_es">Español</button>
  <button class="secondary-button" type="button" data-language="fr" lang="fr" data-i18n="nav.language_fr">Français</button>
  <button class="secondary-button" type="button" data-language="pt" lang="pt" data-i18n="nav.language_pt">Português</button>
</div>
<section class="auth-panel">
  <div>
    <p class="eyebrow" data-i18n="nav.app_name">TB Camera</p>
    <h1>TBC</h1>
  </div>
  <form class="login-form" method="post" action="{{ ingress_prefix }}/login">
    {% if error %}
    <div class="inline-error" data-i18n="{{ error_key }}" data-i18n-params='{{ error_params | tojson }}'>{{ error }}</div>
    {% endif %}
    <label>
      <span data-i18n="camera.username">Username</span>
      <input name="username" autocomplete="username" required autofocus>
    </label>
    <label>
      <span data-i18n="camera_form.password">Password</span>
      <input name="password" type="password" autocomplete="current-password" required>
    </label>
    <button class="primary-button" type="submit" data-i18n="login.sign">Sign in</button>
  </form>
</section>
{% endblock %}
