{% extends "base.html" %}

{% block content %}
<div class="login-language" aria-label="Change language" data-i18n-aria-label="nav.language">
  <label>
    <span class="visually-hidden" data-i18n="nav.language">Language</span>
    <select class="secondary-button" data-language-select aria-label="Change language" data-i18n-aria-label="nav.language">
      <option value="af" data-i18n="nav.language_af">Afrikaans</option><option value="ar" data-i18n="nav.language_ar">Arabic</option><option value="bg" data-i18n="nav.language_bg">Български</option><option value="bn" data-i18n="nav.language_bn">Bengali</option><option value="de" data-i18n="nav.language_de">Deutsch</option><option value="en" selected data-i18n="nav.language_en">English</option><option value="es" data-i18n="nav.language_es">Español</option><option value="fa" data-i18n="nav.language_fa">Persian</option><option value="fr" data-i18n="nav.language_fr">Français</option><option value="hi" data-i18n="nav.language_hi">Hindi</option><option value="id" data-i18n="nav.language_id">Indonesian</option><option value="it" data-i18n="nav.language_it">Italian</option><option value="ja" data-i18n="nav.language_ja">Japanese</option><option value="ko" data-i18n="nav.language_ko">Korean</option><option value="mr" data-i18n="nav.language_mr">Marathi</option><option value="nl" data-i18n="nav.language_nl">Nederlands</option><option value="pa" data-i18n="nav.language_pa">Punjabi</option><option value="pl" data-i18n="nav.language_pl">Polski</option><option value="pt" data-i18n="nav.language_pt">Português</option><option value="ru" data-i18n="nav.language_ru">Russian</option><option value="ta" data-i18n="nav.language_ta">Tamil</option><option value="te" data-i18n="nav.language_te">Telugu</option><option value="th" data-i18n="nav.language_th">Thai</option><option value="tl" data-i18n="nav.language_tl">Tagalog</option><option value="tr" data-i18n="nav.language_tr">Turkish</option><option value="ur" data-i18n="nav.language_ur">Urdu</option><option value="vi" data-i18n="nav.language_vi">Vietnamese</option><option value="zh" data-i18n="nav.language_zh">Chinese</option><option value="zh-Hant" data-i18n="nav.language_zh_hant">Chinese (Traditional)</option>
    </select>
  </label>
</div>
<section class="auth-panel">
  <div>
    <p class="eyebrow" data-i18n="nav.app_name">TB Camera</p>
    <h1>TBC</h1>
  </div>
  <form class="login-form" method="post" action="{{ ingress_prefix }}/login">
    {% if error %}
    <div class="inline-error" data-i18n="{{ error_key }}" data-i18n-params='{{ error_params | tojson }}'>{{ error }}</div>
    {% endif %}
    <label>
      <span data-i18n="camera.username">Username</span>
      <input name="username" autocomplete="username" required autofocus>
    </label>
    <label>
      <span data-i18n="camera_form.password">Password</span>
      <input name="password" type="password" autocomplete="current-password" required>
    </label>
    <button class="primary-button" type="submit" data-i18n="login.sign">Sign in</button>
  </form>
</section>
{% endblock %}
