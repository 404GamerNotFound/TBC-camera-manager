{% extends "base.html" %}

{% block content %}
<section class="page-heading">
  <div>
    <p class="eyebrow">{{ cloud_module.label }} · {{ account.label }}</p>
    <h1 data-i18n="cloud_account.verification_required">Verification required</h1>
  </div>
  <a class="secondary-button" href="{{ ingress_prefix }}/cloud-accounts" data-i18n="cloud_account.back_cloud_accounts">Back to cloud accounts</a>
</section>

<div class="quiet-box">{{ account.pending_verification_message }}</div>

<form class="editor-form" method="post" action="{{ ingress_prefix }}/cloud-accounts/{{ account.id }}/verify">
  <div class="form-grid">
    <label class="span-2">
      <span>{{ field.label if field else 'Verification code' }}</span>
      <input name="code"
             type="{{ field.field_type.value if field else 'text' }}"
             {% if field and field.placeholder %}placeholder="{{ field.placeholder }}"{% endif %}
             {% if field and field.autocomplete %}autocomplete="{{ field.autocomplete }}"{% endif %}
             autofocus required>
      {% if field and field.help_text %}<small>{{ field.help_text }}</small>{% endif %}
    </label>
  </div>
  <div class="form-actions">
    <button class="primary-button" type="submit" data-i18n="cloud_account.confirm">Confirm</button>
  </div>
</form>
{% endblock %}
